<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>封闭式学校点名系统 - 班主任</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 头部导航 -->
    <div class="header">
        <h2>封闭式学校点名系统 - 班主任</h2>
        <div class="user-info">
            <span id="user-info">欢迎，班主任</span>
            <button id="logout-btn" class="logout-btn">退出登录</button>
        </div>
    </div>

    <!-- 侧边栏 -->
    <div class="sidebar">
        <ul>
            <li><a href="#student-management" class="active" onclick="switchTab('student-management')">学生管理</a></li>
            <li><a href="#classroom-layout" onclick="switchTab('classroom-layout')">教室布局管理</a></li>
            <li><a href="#seat-arrangement" onclick="switchTab('seat-arrangement')">座位安排管理</a></li>
            <li><a href="#leave-management" onclick="switchTab('leave-management')">请假管理</a></li>
        </ul>
    </div>

    <!-- 内容区域 -->
    <div class="content">
        <!-- 学生管理 -->
        <div id="student-management" class="tab-content">
            <div class="content-header">
                <h3>学生管理</h3>
                <button id="add-student-btn" class="btn btn-primary">添加学生</button>
            </div>
            <div class="card">
                <table class="table" id="student-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>姓名</th>
                            <th>班级</th>
                            <th>学号</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 动态生成学生列表 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 教室布局管理 -->
        <div id="classroom-layout" class="tab-content" style="display: none;">
            <div class="content-header">
                <h3>教室布局管理</h3>
                <div>
                    <select id="classroom-select" onchange="loadClassroomLayout()">
                        <option value="">选择教室</option>
                        <!-- 动态生成教室列表 -->
                    </select>
                    <div style="margin-top: 10px;">
                        <label>行数：</label>
                        <input type="number" id="row-count" min="1" value="10" style="width: 80px; margin-right: 10px;">
                        <label>列数：</label>
                        <input type="number" id="col-count" min="1" value="12" style="width: 80px; margin-right: 10px;">
                        <button id="generate-layout-btn" class="btn btn-default">生成布局</button>
                    </div>
                    <button id="save-layout-btn" class="btn btn-primary" style="margin-top: 10px;">保存布局</button>
                </div>
            </div>
            <div class="card">
                <!-- 图例 -->
                <div class="layout-legend">
                    <h4>图例</h4>
                    <div class="legend-row">
                        <span class="legend-label">
                            <span class="legend-cell empty"></span>
                            <span>空地</span>
                        </span>
                        <span class="legend-label">
                            <span class="legend-cell seat"></span>
                            <span>座位</span>
                        </span>
                        <span class="legend-label">
                            <span class="legend-cell teacher-desk"></span>
                            <span>讲台</span>
                        </span>
                    </div>
                </div>
                <div class="classroom-layout">
                    <div class="layout-grid" id="layout-grid">
                        <!-- 动态生成教室布局 -->
                    </div>
                </div>
            </div>

            <!-- 悬浮托盘 -->
            <div class="floating-tray">
                <label class="tray-option">
                    <input type="radio" name="cell-type" value="empty" onchange="changeCellType('empty')">
                    <span>空地</span>
                </label>
                <label class="tray-option">
                    <input type="radio" name="cell-type" value="seat" onchange="changeCellType('seat')" checked>
                    <span>座位</span>
                </label>
                <label class="tray-option">
                    <input type="radio" name="cell-type" value="teacher-desk" onchange="changeCellType('teacher-desk')">
                    <span>讲台</span>
                </label>
            </div>
        </div>

        <!-- 座位安排管理 -->
        <div id="seat-arrangement" class="tab-content" style="display: none;">
            <div class="content-header">
                <h3>座位安排管理</h3>
                <div>
                    <select id="course-select" onchange="loadSeatArrangement()">
                        <option value="">选择课程</option>
                        <!-- 动态生成课程列表 -->
                    </select>
                    <button id="save-seat-btn" class="btn btn-primary">保存座位安排</button>
                </div>
            </div>
            <div class="card">
                <!-- 图例 -->
                <div class="layout-legend">
                    <h4>图例</h4>
                    <div class="legend-row">
                        <span class="legend-label">
                            <span class="legend-cell empty"></span>
                            <span>空地</span>
                        </span>
                        <span class="legend-label">
                            <span class="legend-cell seat"></span>
                            <span>座位</span>
                        </span>
                        <span class="legend-label">
                            <span class="legend-cell teacher-desk"></span>
                            <span>讲台</span>
                        </span>
                    </div>
                </div>
                
                <!-- 左右布局 -->
                <div class="split-container" style="display: flex; height: 500px; margin: 20px 0;">
                    <!-- 左侧座位网格 -->
                    <div class="split-left" style="flex: 0 0 75%; border: 1px solid #e8e8e8; border-radius: 4px; padding: 10px; overflow: auto;">
                        <div class="seat-arrangement">
                            <div class="layout-grid" id="seat-grid">
                                <!-- 动态生成座位安排 -->
                            </div>
                        </div>
                    </div>
                    
                    <!-- 拖拽分隔线 -->
                    <div class="split-handle" style="width: 8px; background-color: #e8e8e8; cursor: col-resize; user-select: none;"></div>
                    
                    <!-- 右侧学生列表 -->
                    <div class="split-right" style="flex: 0 0 25%; border: 1px solid #e8e8e8; border-radius: 4px; padding: 10px; overflow: auto;">
                        <h4 style="margin-bottom: 15px; color: #666;">学生列表</h4>
                        <div id="student-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px;">
                            <!-- 动态生成学生列表 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 请假管理 -->
        <div id="leave-management" class="tab-content" style="display: none;">
            <div class="content-header">
                <h3>请假管理</h3>
                <button id="add-leave-btn" class="btn btn-primary">添加请假</button>
            </div>
            <div class="card">
                <table class="table" id="leave-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>学生姓名</th>
                            <th>班级</th>
                            <th>开始时间</th>
                            <th>结束时间</th>
                            <th>原因</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 动态生成请假列表 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div id="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 1000;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: white; padding: 30px; border-radius: 8px; width: 400px;">
            <h3 id="modal-title">添加学生</h3>
            <form id="modal-form" class="form">
                <!-- 动态生成表单内容 -->
            </form>
            <div style="margin-top: 20px; text-align: right;">
                <button id="modal-cancel" class="btn btn-default">取消</button>
                <button id="modal-save" class="btn btn-primary">保存</button>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/headmaster.js"></script>
</body>
</html>
