<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>封闭式学校点名系统 - 管理员</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 头部导航 -->
    <div class="header">
        <h2>封闭式学校点名系统 - 管理员</h2>
        <div class="user-info">
            <span id="user-info">欢迎，管理员</span>
            <button id="logout-btn" class="logout-btn">退出登录</button>
        </div>
    </div>

    <!-- 侧边栏 -->
    <div class="sidebar">
        <ul>
            <li><a href="#user-management" class="active" onclick="switchTab('user-management')">用户管理</a></li>
            <li><a href="#classroom-management" onclick="switchTab('classroom-management')">教室管理</a></li>
            <li><a href="#subject-management" onclick="switchTab('subject-management')">学科管理</a></li>
            <li><a href="#course-management" onclick="switchTab('course-management')">课程管理</a></li>
            <li><a href="#class-management" onclick="switchTab('class-management')">班级管理</a></li>
        </ul>
    </div>

    <!-- 内容区域 -->
    <div class="content">
        <!-- 用户管理 -->
        <div id="user-management" class="tab-content">
            <div class="content-header">
                <h3>用户管理</h3>
                <button id="add-user-btn" class="btn btn-primary">添加用户</button>
            </div>
            <div class="card">
                <table class="table" id="user-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>角色</th>
                            <th>邮箱</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 动态生成用户列表 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 教室管理 -->
        <div id="classroom-management" class="tab-content" style="display: none;">
            <div class="content-header">
                <h3>教室管理</h3>
                <button id="add-classroom-btn" class="btn btn-primary">添加教室</button>
            </div>
            <div class="card">
                <table class="table" id="classroom-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>教室名称</th>
                            <th>位置</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 动态生成教室列表 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 学科管理 -->
        <div id="subject-management" class="tab-content" style="display: none;">
            <div class="content-header">
                <h3>学科管理</h3>
                <button id="add-subject-btn" class="btn btn-primary">添加学科</button>
            </div>
            <div class="card">
                <table class="table" id="subject-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>学科名称</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 动态生成学科列表 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 课程管理 -->
        <div id="course-management" class="tab-content" style="display: none;">
            <div class="content-header">
                <h3>课程管理</h3>
                <button id="add-course-btn" class="btn btn-primary">添加课程</button>
            </div>
            <div class="card">
                <table class="table" id="course-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>课程名称</th>
                            <th>班级</th>
                            <th>教室</th>
                            <th>学科</th>
                            <th>教师</th>
                            <th>星期</th>
                            <th>时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 动态生成课程列表 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 班级管理 -->
        <div id="class-management" class="tab-content" style="display: none;">
            <div class="content-header">
                <h3>班级管理</h3>
                <button id="add-class-btn" class="btn btn-primary">添加班级</button>
            </div>
            <div class="card">
                <table class="table" id="class-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>班级名称</th>
                            <th>班主任</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 动态生成班级列表 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div id="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 1000;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: white; padding: 30px; border-radius: 8px; width: 400px;">
            <h3 id="modal-title">添加用户</h3>
            <form id="modal-form" class="form">
                <!-- 动态生成表单内容 -->
            </form>
            <div style="margin-top: 20px; text-align: right;">
                <button id="modal-cancel" class="btn btn-default">取消</button>
                <button id="modal-save" class="btn btn-primary">保存</button>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
